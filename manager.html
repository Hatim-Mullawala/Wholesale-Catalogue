<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard - Hatimi Hardware</title>
    <style>
        :root { --primary-gold: #b38728; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; color: #333; }

        /* HEADER & SEARCH */
        .search-container { background: white; padding: 15px 0; display: flex; justify-content: center; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 1000; }
        .search-box { width: 90%; max-width: 700px; padding: 12px 25px; border: 1.5px solid var(--primary-gold); border-radius: 50px; font-size: 16px; outline: none; }

        .main-wrapper { max-width: 1300px; margin: 20px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.06); }
        .catalog-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 3px solid var(--primary-gold); margin-bottom: 20px; }
        .logo-img { height: 80px !important; width: auto; display: block; object-fit: contain; }
        .brand-name { margin: 0; font-size: 28px; font-weight: 800; color: #b38728; text-transform: uppercase; }
        
        /* CATEGORY & GRID */
        .category-header { background: #222; color: #fff; padding: 12px 20px; font-size: 18px; font-weight: 700; text-transform: uppercase; margin-top: 30px; border-left: 8px solid var(--primary-gold); border-radius: 4px; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px 0; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; } }
        
        /* CARD STRUCTURE */
        .product-card { background: white; border: 1.5px solid #efefef; border-radius: 12px; padding: 15px; text-align: center; position: relative; min-height: 350px; display: flex; flex-direction: column; justify-content: flex-start; }
        .img-holder { height: 160px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #fff; }
        .img-holder img { max-height: 100%; max-width: 100%; object-fit: contain; }

        .trash-btn { position: absolute; top: 10px; right: 10px; background: white; color: #e74c3c; border: 1px solid #ddd; width: 38px; height: 38px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* SIDE CONTROLS */
        .side-controls { position: fixed; bottom: 30px; right: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 5000; }
        .ctrl-btn { width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-weight: bold; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-logout { background: #e74c3c; color: white; font-size: 11px; }
        .btn-add { background: #222; color: white; font-size: 32px; }
        #backToTop { background: var(--primary-gold); color: white; font-size: 22px; display: none; }

        /* MODAL STYLING */
        .modal { display: none; position: fixed; z-index: 9999 !important; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 450px; padding: 25px; border-radius: 15px; position: relative; pointer-events: auto; }
        .close-modal { position: absolute; right: 15px; top: 10px; font-size: 30px; cursor: pointer; color: #888; }
        .input-group { margin-bottom: 15px; }
        .input-group input, .input-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .modal-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .btn-view { background: var(--primary-gold); color: white; padding: 12px; border-radius: 8px; font-weight: bold; border: none; margin-top: auto; width: 100%; cursor: pointer; }
  /* Styling for icons inside the modal table */
.action-icon {
    cursor: pointer;
    padding: 5px;
    border-radius: 4px;
    transition: 0.2s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}
.action-icon:hover { background: #f0f0f0; }
.edit-icon { color: #b38728; margin-right: 10px; }
.delete-row-icon { color: #e74c3c; }

/* Modal Table Padding */
.modal-table td { vertical-align: middle; padding: 12px 8px; }
  </style>
</head>
<body>

    /* 1. SECURITY GATE */

        const p = prompt("Manager Password:");

<div class="search-container">

<div class="main-wrapper">
    <header class="catalog-header">

        <span class="close-modal" onclick="closeAllModals()">×</span>

<div id="priceModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeAllModals()">×</span>
        <h2 id="modalTitle" style="color: var(--primary-gold); margin: 0;"></h2>
        <p id="modalBrand" style="font-weight: bold; color: #666; margin-bottom: 15px;"></p>
        <table class="modal-table">
            <thead>
    <tr style="text-align:left; border-bottom:2px solid #ddd;">
        <th style="padding:10px;">Size / Specs</th>
        <th style="padding:10px;">MRP (₹)</th>
        <th style="padding:10px; text-align:right;">Actions</th> </tr>

        </table>
        <button onclick="closeAllModals()" class="btn-view" style="background:#eee; color:#333; margin-top:20px;">Close Window</button>

</div>

<script>
    const productSheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqfLPTM9QCajpUToFw0B2UTKUIv-0d3P5ldQxLWKYfD98PPVf5ZEDXITZuTrdNPh8D8dDKcJxO1D4O/pub?gid=897547923&single=true&output=csv';
    const webAppUrl = 'https://script.google.com/macros/s/AKfycbx4RPSNl_zIWlovQkvRKFJxNm82SA4KzEpgAyI133PrzMExbnh-9a7O4jJPX84xWlHZ/exec';

    let allProducts = [];

    /* 2. ROBUST PARSER & CLEANER */
    function parseCSVLine(line) {
        const result = []; let cell = '', inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            if (line[i] === '"' && line[i+1] === '"') { cell += '"'; i++; }
            else if (line[i] === '"') inQuotes = !inQuotes;
            else if (line[i] === ',' && !inQuotes) { result.push(cell.trim()); cell = ''; }
            else cell += line[i];
        }
        result.push(cell.trim()); return result;
    }

    function cleanMRP(val) { return (val || "0").toString().replace(/[^0-9.]/g, ''); }

    /* --- UPDATED DATA LOADING WITH MULTI-LEVEL SORTING --- */
async function loadManagerData() {
    try {
        const resp = await fetch(productSheetURL);
        const text = await resp.text();
        const rows = text.split('\n').filter(r => r.trim() !== '').slice(1);
        
        allProducts = rows.map(r => {
            const c = parseCSVLine(r);
            return { 
                cat: c[0] || "Uncategorized", 
                brand: c[1] || "No Brand", 
                name: c[2] || "Unnamed Product", 
                specs: c[3] || "Standard", 
                mrp: cleanMRP(c[5]) 
            };
        });

        // MULTI-LEVEL SORT
        allProducts.sort((a, b) => {
            // 1. Sort by Category (A-Z)
            if (a.cat !== b.cat) return a.cat.localeCompare(b.cat);
            // 2. Then Sort by Brand (A-Z)
            if (a.brand !== b.brand) return a.brand.localeCompare(b.brand);
            // 3. Finally Sort by Name (A-Z)
            return a.name.localeCompare(b.name);
        });

        renderManagerCatalog(allProducts);
        populateCats(allProducts);
    } catch (e) { console.error("Sort Error:", e); }
}

    /* 4. RENDERER WITH GROUPING */
    function renderManagerCatalog(products) {
        const container = document.getElementById('manager-container');
        const seen = new Set();
        let currentCat = "", html = "";
        
        products.forEach(p => {
            const key = `${p.brand.trim()}|${p.name.trim()}`;
            if (!seen.has(key)) {
                if (p.cat !== currentCat) {
                    if (html !== "") html += `</div>`;
                    currentCat = p.cat;
                    html += `<div class="category-header">${currentCat}</div><div class="product-grid">`;
                }
                
                const cleanN = p.name.toLowerCase().trim().replace(/[,\s./_]+/g, '-').replace(/-+/g, '-');
                const cleanB = p.brand.toLowerCase().trim().replace(/[,\s./_]+/g, '-').replace(/-+/g, '-');
                const imgId = `img-${Math.random().toString(36).substr(2, 5)}`;

                html += `<div class="product-card">
                    <div class="trash-btn" onclick="deleteProduct('${p.brand.replace(/'/g, "\\'")}', '${p.name.replace(/'/g, "\\'")}')">
                        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M9,3V4H4V6H5V19A2,2 0 0,0 7,21H17A2,2 0 0,0 19,19V6H20V4H15V3H9M7,6H17V19H7V6M9,8V17H11V8H9M13,8V17H15V8H13Z"/></svg>
                    </div>
                    <div class="img-holder"><img id="${imgId}" src="https://via.placeholder.com/150?text=Searching..."></div>
                    <div style="color:var(--primary-gold); font-weight:900; font-size:11px; text-transform:uppercase;">${p.brand}</div>
                    <div style="font-weight:800; font-size:18px; line-height:1.2; margin-bottom:15px;">${p.name}</div>
                    <button class="btn-view" onclick="openModal('${p.name.replace(/'/g, "\\'")}', '${p.brand.replace(/'/g, "\\'")}')">Check Sizes</button>
                </div>`;
                
                setTimeout(() => tryLoadImage(imgId, [`wholesale/${cleanB}-${cleanN}.jpg`, `wholesale/${cleanN}.jpg`], p.name), 50);
                seen.add(key);
            }
        });
        container.innerHTML = html + "</div>";
    }

/* --- FIXED MODAL: Removes duplicate sizes --- */
function openModal(name, brand) {
    document.getElementById('modalTitle').innerText = name;
    document.getElementById('modalBrand').innerText = brand;
    const tbody = document.getElementById('modalTableBody');
    tbody.innerHTML = "";

    const variants = allProducts.filter(p => 
        p.name.trim().toLowerCase() === name.trim().toLowerCase() && 
        p.brand.trim().toLowerCase() === brand.trim().toLowerCase()
    );
    
    const shownSizes = new Set();

    variants.forEach((v, idx) => {
        const sizeList = v.specs.split(','); 
        sizeList.forEach((singleSize, sIdx) => {
            const cleanSize = singleSize.trim();
            if (cleanSize !== "" && !shownSizes.has(cleanSize)) {
                // We create unique IDs for the Size and MRP cells
                const rowId = `row-${idx}-${sIdx}`;
                tbody.innerHTML += `
                    <tr id="${rowId}" style="border-bottom:1px solid #eee;">
                        <td class="size-cell" style="padding:12px; font-weight:700;">${cleanSize}</td>
                        <td class="mrp-cell" style="padding:12px; color: #b38728; font-weight:bold;">₹${v.mrp}</td>
                        <td style="text-align: right; white-space: nowrap;">
                            <span class="action-icon edit-icon" onclick="makeEditable('${rowId}', '${v.brand}', '${v.name}', '${cleanSize}', '${v.mrp}')">
                                <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M20.71,7.04C21.1,6.65 21.1,6 20.71,5.63L18.37,3.29C18,2.9 17.35,2.9 16.96,3.29L15.12,5.12L18.87,8.87M3,17.25V21H6.75L17.81,9.93L14.06,6.18L3,17.25Z"/></svg>
                            </span>
                            <span class="action-icon delete-row-icon" onclick="deleteRow('${v.brand}', '${v.name}', '${cleanSize}')">
                                <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19V4M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg>
                            </span>
                        </td>
                    </tr>`;
                shownSizes.add(cleanSize);
            }
        });
    });
    document.getElementById('priceModal').style.display = "flex";
}
    /* 6. ACTIONS */
    async function deleteProduct(brand, name) {
        if (confirm(`⚠️ DELETE WARNING: Permanent removal of ${brand} ${name}. Continue?`)) {
            await fetch(webAppUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "delete", brand, name }) });
            alert("Deleted! Reloading...");
            location.reload();
        }
    }
/* --- MODAL CONTROL FUNCTIONS --- */

// This function closes the size window
function closeModal() {
    document.getElementById('priceModal').style.display = "none";
}
/* --- FIXED MODAL CONTROLS --- */

// 1. Function to Open the Add Product Pop-up
function openAddModal(event) {
    // If you pass 'event', it prevents the background-click from triggering
    if (event) event.stopPropagation(); 
    
    const modal = document.getElementById('addModal');
    if (modal) {
        modal.style.display = "flex";
        console.log("Add Modal Opened"); // For testing
    } else {
        console.error("Error: addModal element not found in HTML");
    }
}

// 2. Universal Close Function
function closeAllModals() {
    document.getElementById('priceModal').style.display = "none";
    document.getElementById('addModal').style.display = "none";
}

// 3. Background Click Security
window.onclick = function(event) {
    const priceM = document.getElementById('priceModal');
    const addM = document.getElementById('addModal');
    
    // Only close if the user clicks the DARK area, not the white box
    if (event.target == priceM) {
        priceM.style.display = "none";
    }
    if (event.target == addM) {
        addM.style.display = "none";
    }
};
// This function closes the add product window
function closeAddModal() {
    document.getElementById('addModal').style.display = "none";
}

// This allows you to close the window by clicking the dark background
window.onclick = function(event) {
    const priceM = document.getElementById('priceModal');
    const addM = document.getElementById('addModal');
    if (event.target == priceM) closeModal();
    if (event.target == addM) closeAddModal();
};
    async function submitToSheet() {
    const btn = document.getElementById('submitBtn');
    
    // 1. Collect the data from the inputs
    const cat = document.getElementById('newCat').value;
    const brand = document.getElementById('newBrand').value;
    const name = document.getElementById('newName').value;
    const specs = document.getElementById('newSpecs').value;
    const mrp = document.getElementById('newMrp').value;

    // 2. Simple Validation
    if (!cat || !name) {
        alert("Please select a Category and enter a Product Name!");
        return;
    }

    // 3. Visual feedback
    btn.innerText = "Saving to Google...";
    btn.disabled = true;

    // 4. Prepare the data package
    const data = { 
        action: "add", 
        cat: cat, 
        brand: brand, 
        name: name, 
        specs: specs, 
        mrp: mrp 
    };

    try {
        // 5. Send to Google Sheets
        await fetch(webAppUrl, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify(data) 
        });
        
        alert("Product Added Successfully!");
        location.reload(); // Refresh to show the new product
    } catch (e) {
        alert("Error: Could not connect to the Sheet.");
        btn.disabled = false;
        btn.innerText = "Add to Sheet";
    }
}

    /* 7. UTILS */
    function tryLoadImage(id, paths, fallback) {
        let step = 0; const img = document.getElementById(id);
        const check = () => {
            if (step < paths.length) {
                const t = new Image(); t.src = paths[step];
                t.onload = () => img.src = paths[step];
                t.onerror = () => { step++; check(); };
            } else { img.src = `https://via.placeholder.com/150?text=${encodeURIComponent(fallback)}`; }
        };
        check();
    }
    /* --- SPECIFIC ROW ACTIONS --- */
async function editRow(brand, name, oldSize, oldMrp) {
    const newSize = prompt("Enter New Size/Specs:", oldSize);
    const newMrp = prompt("Enter New MRP (₹):", oldMrp);
    
    if (newSize !== null && newMrp !== null) {
        // We send "oldSize" so the script can find the right row to change
        const data = { 
            action: "updateRow", 
            brand: brand, 
            name: name, 
            oldSize: oldSize, 
            newSize: newSize, 
            newMrp: newMrp 
        };

        try {
            await fetch(webAppUrl, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify(data) 
            });
            alert("Update successful! Refreshing...");
            location.reload();
        } catch (e) {
            alert("Error: Could not connect to Google Sheets.");
        }
    }
}

// Function to Delete just ONE size
async function deleteRow(brand, name, size) {
    if (confirm(`⚠️ DELETE SIZE: Are you sure you want to remove the "${size}" size for ${name}?`)) {
        const data = { action: "deleteRow", brand, name, size };
        await fetch(webAppUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        alert("Size Deleted.");
        location.reload();
    }
}

    function populateCats(products) {
        const select = document.getElementById('newCat');
        const cats = [...new Set(products.map(p => p.cat))].sort();
        let h = '<option value="" disabled selected>Select Category</option>';
        cats.forEach(c => h += `<option value="${c}">${c}</option>`);
        select.innerHTML = h;
    }

    function filterProducts() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.product-card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(q) ? "" : "none");
    }

    function logout() {
    // Clear the security token
    sessionStorage.removeItem('managerAuth');
    
    // Redirect back to the clean customer view
    window.location.href = "index.html";
}
    function scrollToTop() { window.scrollTo({top: 0, behavior: 'smooth'}); }
    window.onscroll = () => { document.getElementById("backToTop").style.display = (window.scrollY > 300) ? "flex" : "none"; };
    /* --- IN-LINE EDITING LOGIC --- */

function makeEditable(rowId, brand, name, oldSize, oldMrp) {
    const row = document.getElementById(rowId);
    const sizeCell = row.querySelector('.size-cell');
    const mrpCell = row.querySelector('.mrp-cell');
    const actionCell = row.querySelector('td:last-child');

    // 1. Change text to input boxes
    sizeCell.innerHTML = `<input type="text" id="edit-size-${rowId}" value="${oldSize}" style="width:80px; padding:5px; border:1px solid #b38728;">`;
    mrpCell.innerHTML = `₹<input type="number" id="edit-mrp-${rowId}" value="${oldMrp}" style="width:60px; padding:5px; border:1px solid #b38728;">`;

    // 2. Change icons to a "Save" Checkmark
   actionCell.innerHTML = `
    <button onclick="saveInLine('${rowId}', '${brand}', '${name}', '${oldSize}')" style="background:#27ae60; color:white; border:none; padding:6px 10px; border-radius:4px; cursor:pointer; font-weight:bold; font-size:11px;">SAVE</button>
    <button onclick="cancelEdit('${rowId}', '${oldSize}', '${oldMrp}', '${brand}', '${name}')" style="background:#95a5a6; color:white; border:none; padding:6px 10px; border-radius:4px; cursor:pointer; margin-left:5px; font-size:11px;">X</button>
`;
}

async function saveInLine(rowId, brand, name, oldSize) {
    const row = document.getElementById(rowId);
    const newSize = document.getElementById(`edit-size-${rowId}`).value;
    const newMrp = document.getElementById(`edit-mrp-${rowId}`).value;
    const actionCell = row.querySelector('td:last-child');

    actionCell.innerHTML = `<span style="color:#b38728; font-size:10px;">SAVING...</span>`;

    const data = { 
        action: "updateRow", 
        brand: brand, 
        name: name, 
        oldSize: oldSize, 
        newSize: newSize, 
        newMrp: newMrp 
    };

    try {
        // Use 'cors' mode to see if there are errors, or stick to 'no-cors' if it works
        await fetch(webAppUrl, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify(data) 
        });

        // Instant Local Update
        allProducts.forEach(p => {
            if (p.brand === brand && p.name === name && p.specs === oldSize) {
                p.specs = newSize; p.mrp = newMrp;
            }
        });

        row.querySelector('.size-cell').innerText = newSize;
        row.querySelector('.mrp-cell').innerText = "₹" + newMrp;

        actionCell.innerHTML = `
            <span class="action-icon edit-icon" onclick="makeEditable('${rowId}', '${brand}', '${name}', '${newSize}', '${newMrp}')">
                <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M20.71,7.04C21.1,6.65 21.1,6 20.71,5.63L18.37,3.29C18,2.9 17.35,2.9 16.96,3.29L15.12,5.12L18.87,8.87M3,17.25V21H6.75L17.81,9.93L14.06,6.18L3,17.25Z"/></svg>
            </span>
            <span class="action-icon delete-row-icon" onclick="deleteRow('${brand}', '${name}', '${newSize}')">
                <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19V4M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg>
            </span>`;
    } catch (e) {
        actionCell.innerHTML = `<span style="color:red;">Failed</span>`;
    }
}
function cancelEdit(rowId, oldSize, oldMrp, brand, name) {
    const row = document.getElementById(rowId);
    row.querySelector('.size-cell').innerText = oldSize;
    row.querySelector('.mrp-cell').innerText = "₹" + oldMrp;
    
    row.querySelector('td:last-child').innerHTML = `
        <span class="action-icon edit-icon" onclick="makeEditable('${rowId}', '${brand}', '${name}', '${oldSize}', '${oldMrp}')">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M20.71,7.04C21.1,6.65 21.1,6 20.71,5.63L18.37,3.29C18,2.9 17.35,2.9 16.96,3.29L15.12,5.12L18.87,8.87M3,17.25V21H6.75L17.81,9.93L14.06,6.18L3,17.25Z"/></svg>
        </span>
        <span class="action-icon delete-row-icon" onclick="deleteRow('${brand}', '${name}', '${oldSize}')">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19V4M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg>
        </span>
    `;
}
    loadManagerData();
</script>
