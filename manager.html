        /* UPDATED GRID FOR 5 CARDS IN A ROW */
.product-grid { 
    display: grid; 
    grid-template-columns: repeat(2, 1fr); /* 2 cards on small mobile screens */
    gap: 12px; 
    padding: 15px 0; 
}

@media (min-width: 768px) { 
    .product-grid { 
        grid-template-columns: repeat(3, 1fr); /* 3 cards on tablets */
    } 
}

@media (min-width: 1024px) { 
    .product-grid { 
        /* The magic number to get 5 in a row on desktops */
        grid-template-columns: repeat(5, 1fr); 
        gap: 15px; 
    } 
}
 /* PREMIUM CARD DESIGN */
.product-card { 
    background: white; 
    border: 1px solid #e2e8f0; 
    border-radius: 12px; 
    padding: 12px; 
    text-align: center; 
    position: relative; 
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    justify-content: space-between; /* Keeps buttons aligned at the bottom */
    height: 300px; /* Uniform height for all cards */
}

/* Add a soft shadow only when you hover over a card */
.product-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.08);
    border-color: var(--primary-gold);
}

/* FIXED IMAGE CONTAINER */
.img-holder { 
    height: 130px; 
    width: 100%;
    margin-bottom: 10px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    background: #fbfbfb; /* Very light grey background for images */
    border-radius: 8px;
    overflow: hidden;
}

.img-holder img { 
    max-height: 110px; 
    max-width: 90%; 
    object-fit: contain; 
    filter: drop-shadow(0 5px 10px rgba(0,0,0,0.05)); /* Makes product pop */
}

.product-card div[style*="font-weight:900"] {
    font-size: 10px !important;
    letter-spacing: 1px;
    margin-top: 5px;
}

.product-card div[style*="font-size:18px"] {
    font-size: 15px !important; /* Slightly smaller to fit 5 per row better */
    font-weight: 700 !important;

    margin-bottom: 10px;

    align-items: center;
    justify-content: center;

}

<script>
    /* 1. SECURITY GATE */
    if (sessionStorage.getItem('managerAuth') !== 'true') {
        const p = prompt("Manager Password:");
        if (p === "hatimi786") { sessionStorage.setItem('managerAuth', 'true'); }
        else { window.location.href = "index.html"; }
    }

    let submitted = false; 
    
    // --- YOUR DATA LINKS ---
    const productSheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqfLPTM9QCajpUToFw0B2UTKUIv-0d3P5ldQxLWKYfD98PPVf5ZEDXITZuTrdNPh8D8dDKcJxO1D4O/pub?gid=897547923&single=true&output=csv';
    const webAppUrl = 'https://script.google.com/macros/s/AKfycbys3Xer5R9mEx-B1UwYCJnb0_GVfZc-KoseAnEGYwFUxvHvsSCMx4AnfqsJc1x__iVn/exec';

    let allProducts = [];
// --- 1. LOAD DATA FROM CLOUD ---
function loadManagerData() {
    const container = document.getElementById('manager-container');
    container.innerHTML = "Opening Hatimi Inventory...";

    const script = document.createElement('script');
    // We add a timestamp (t=) to ensure we always get fresh data from the sheet
    script.src = `${webAppUrl}?callback=handleGoogleResponse&t=${Date.now()}`;
    
    script.onerror = function() {
        container.innerHTML = "<p style='color:red;'>Connection Error. Please check your WebApp URL.</p>";
    };

    document.body.appendChild(script);
}

// --- 2. RECEIVE DATA & FILL DROPDOWNS ---
function handleGoogleResponse(data) {
    allProducts = data;
    const container = document.getElementById('manager-container');
    container.innerHTML = ""; 
    
    // Show products on the dashboard
    renderManagerCatalog(allProducts);
    
    // Fill the Category Dropdown in the "Add Product" modal
    populateCats(allProducts);

    // ADDED: Fill the smart auto-complete lists for Brand and Name
    populateSuggestions(allProducts);
}
    function parseCSVLine(line) {
        const result = []; let cell = '', inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            if (line[i] === '"' && line[i+1] === '"') { cell += '"'; i++; }
            else if (line[i] === '"') inQuotes = !inQuotes;
            else if (line[i] === ',' && !inQuotes) { result.push(cell.trim()); cell = ''; }
            else cell += line[i];
        }
        result.push(cell.trim()); return result;
    }
    // --- SAFE CLICK HELPERS ---
    window.handleSafeEdit = function(encN, encB) {
        const name = decodeURIComponent(encN);
        const brand = decodeURIComponent(encB);
        if (typeof openModal === "function") openModal(name, brand);
    };

    window.handleSafeDelete = function(encB, encN) {
        const brand = decodeURIComponent(encB);
        const name = decodeURIComponent(encN);
        if (typeof deleteEntireProduct === "function") deleteEntireProduct(brand, name);
    };
function renderManagerCatalog(products) {
        const container = document.getElementById('manager-container');
        const seen = new Set();
        let currentCat = "", html = "";

        // CRITICAL FIX: The sorting logic is restored here
        const sortedProducts = [...products].sort((a, b) => 
            String(a.cat || "").localeCompare(String(b.cat || "")) || 
            String(a.brand || "").localeCompare(String(b.brand || ""))
        );

        sortedProducts.forEach(p => {
            const b = String(p.brand || "N/A"), n = String(p.name || "Unnamed"), c = String(p.cat || "Other");
            const key = `${c}|${b}|${n}`;
            
            if (!seen.has(key)) {
                if (c !== currentCat) {
                    if (html !== "") html += `</div>`; 
                    currentCat = c;

    function tryLoadImage(imgElement, urls) {
        if (!imgElement) return;

                imgTester.onload = () => { imgElement.src = urls[index-1]; };
                imgTester.onerror = attemptLoad;

  function openModal(name, brand) {
    document.getElementById('modalTitle').innerText = name;
    document.getElementById('modalBrand').innerText = brand;
    const tbody = document.getElementById('modalTableBody');
    tbody.innerHTML = "";

    // 1. Find the matching product
    const variants = allProducts.filter(p => {
        const pName = String(p.name || "Unnamed Product").trim();
        const pBrand = (p.brand && String(p.brand).trim() !== "") ? String(p.brand).trim() : "N/A";
        return pName === name.trim() && pBrand === brand.trim();
    });

    // 2. Collect ALL sizes into a list first
    let collectedSizes = [];
    variants.forEach((v, idx) => {
        const sizeList = String(v.specs || "").split(','); 
        sizeList.forEach((singleSize, sIdx) => {
            const cleanS = singleSize.trim();
            if (cleanS !== "") {
                collectedSizes.push({
                    cleanS: cleanS,
                    v: v,
                    rowId: `row-${idx}-${sIdx}`
                });
            }
        });
    });

    // 3. THE "HARDWARE MATH" SORTER
    // This translates units to a base level (grams, ml, mm) so they sort correctly
    function getBaseValue(sizeStr) {
        // Strip out quotes and find the number and the letters
        const match = sizeStr.toLowerCase().replace(/['"]/g, '').match(/^([\d.]+)\s*([a-z]+)?/);
        if (!match) return { val: 0, valid: false };
        
        let num = parseFloat(match[1]);
        let unit = match[2] || "";
        let mult = 1; // Default multiplier

        // Weights
        if (unit === 'kg') mult = 1000;
        else if (unit === 'g' || unit === 'gm') mult = 1;
        // Volumes
        else if (unit === 'l' || unit === 'ltr') mult = 1000;
        else if (unit === 'ml') mult = 1;
        // Lengths
        else if (unit === 'cm') mult = 10;
        else if (unit === 'mm') mult = 1;
        else if (unit === 'inch' || unit === 'in') mult = 25.4;

        return { val: num * mult, valid: true };
    }

    collectedSizes.sort((a, b) => {
        const valA = getBaseValue(a.cleanS);
        const valB = getBaseValue(b.cleanS);
        
        // If both have recognized units, sort by the true base value
        if (valA.valid && valB.valid) {
            return valA.val - valB.val;
        }
        // Fallback for things without units
        return a.cleanS.localeCompare(b.cleanS, undefined, { numeric: true, sensitivity: 'base' });
    });

    // 4. Render the perfectly sorted list
    const shownSizes = new Set();
    collectedSizes.forEach(item => {
        if (!shownSizes.has(item.cleanS)) {
            
            const encB = encodeURIComponent(item.v.brand).replace(/'/g, "%27");
            const encN = encodeURIComponent(item.v.name).replace(/'/g, "%27");
            const encS = encodeURIComponent(item.cleanS).replace(/'/g, "%27");
            const safeMRP = String(item.v.mrp || "0");

            tbody.innerHTML += `
            <tr id="${item.rowId}" style="border-bottom:1px solid #eee;">
                <td class="size-cell" style="padding:12px; font-weight:700;">${item.cleanS}</td>
                <td class="mrp-cell" style="padding:12px; color: #b38728; font-weight:bold;">₹${safeMRP}</td>
                <td style="text-align: right;">
                    <span class="action-icon edit-icon" onclick="makeEditable('${item.rowId}', '${encB}', '${encN}', '${encS}', '${safeMRP}')">
                        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M20.71,7.04C21.1,6.65 21.1,6 20.71,5.63L18.37,3.29C18,2.9 17.35,2.9 16.96,3.29L15.12,5.12L18.87,8.87M3,17.25V21H6.75L17.81,9.93L14.06,6.18L3,17.25Z"/></svg>
                    </span>
                    <span class="action-icon delete-row-icon" onclick="deleteRowSafe('${encB}', '${encN}', '${encS}', '${item.rowId}')">
                        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19V4M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg>
                    </span>
                </td>
            </tr>`;
            shownSizes.add(item.cleanS);
        }
    });

    document.getElementById('priceModal').style.display = "flex";
}

let deleteTimeout = null;
let lastDeletedData = null;
function showUndoToast(message, actionData) {
    if (deleteTimeout) executeFinalDelete(); 
    lastDeletedData = actionData;

    const toast = document.createElement('div');
    toast.id = "undoToast";
    toast.className = `toast-msg`;
    toast.innerHTML = `
        <span>${message}</span>
        <span class="undo-link" onclick="undoAction()">Undo</span>
        <div class="toast-timer"><div class="toast-progress"></div></div>
    `;
    document.body.appendChild(toast);

    deleteTimeout = setTimeout(() => executeFinalDelete(), 5000);
}

function undoAction() {
    clearTimeout(deleteTimeout);
    deleteTimeout = null;
    document.getElementById('undoToast')?.remove();

    if (lastDeletedData.type === 'full') {
        const target = document.getElementById(lastDeletedData.id);
        if(target) {
            target.style.display = 'flex';
            setTimeout(() => target.style.opacity = '1', 10);
        }
    } else {
        const row = document.getElementById(lastDeletedData.id);
        if(row) row.style.display = 'table-row';
    }
    
    lastDeletedData = null;
    showToast("Restored successfully!", "success"); // Feedback for Undo
}

async function executeFinalDelete() {
    const toast = document.getElementById('undoToast');
    if (toast) {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
    }
    
    if (!lastDeletedData) return;

    // CRITICAL FIX: The action names now perfectly match what Google Sheets expects
    const payload = { 
        action: lastDeletedData.type === 'full' ? "deleteEntireProduct" : "deleteSingleSize",
        brand: lastDeletedData.brand,
        name: lastDeletedData.name,
        size: lastDeletedData.size 
    };

    // 1. Send the data to Google
    fetch(webAppUrl, { 
        method: 'POST', 
        mode: 'no-cors', 
        body: JSON.stringify(payload) 
    });

    // 2. TRIGGER THE MESSAGE MANUALLY
    setTimeout(() => {
        showToast("Successfully deleted from Hatimi Cloud", "success");
    }, 500);

    // 3. Clear the memory
    lastDeletedData = null;
    deleteTimeout = null;
}

   async function handleAddProduct(event) {
    event.preventDefault(); 
    
    const btn = document.getElementById('submitBtn');
    btn.innerText = "SAVING TO SHEET...";
    btn.disabled = true;

    try {
        const fileInput = document.getElementById('new-product-file');
        let fileData = "", mimeType = "", filename = "";

        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            const reader = new FileReader();
            fileData = await new Promise((res) => {
                reader.onload = (e) => res(e.target.result.split(',')[1]);
                reader.readAsDataURL(file);
            });
            mimeType = file.type;
            filename = file.name;
        }

        const payload = {
            action: "addWithImage",
            cat: document.getElementById('newCat').value,
            brand: document.getElementById('newBrand').value || "N/A",
            name: document.getElementById('newName').value,
            specs: document.getElementById('newSpecs').value,
            mrp: document.getElementById('newMrp').value,
            fileData: fileData,
            mimeType: mimeType,
            filename: filename
        };

        // Send to Google using 'no-cors' to bypass security blocks
        await fetch(webAppUrl, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(payload)
        });

        showToast("Product added successfully!", "success");
        
        // Reset form and UI
        document.getElementById('addProductForm').reset();
        closeAllModals();

        // Refresh the whole inventory after 2 seconds
        setTimeout(() => { loadManagerData(); }, 2000);

    } catch (error) {
        console.error(error);
        showToast("Failed to save product.", "error");
    } finally {
        btn.innerText = "Add to Inventory";
        btn.disabled = false;
    }
}

function showSuggestions(input, type) {
    const value = input.value.toLowerCase();
    const container = document.getElementById(type === 'brand' ? 'brandSuggestions' : 'nameSuggestions');
    const list = type === 'brand' ? uniqueBrands : uniqueNames;
    
    container.innerHTML = "";
    
    if (!value) {
        container.style.display = "none";
        return;
    }

    const filtered = list.filter(item => item.toLowerCase().includes(value));

    if (filtered.length > 0) {
        container.style.display = "block";
        filtered.forEach(item => {
            const div = document.createElement('div');
            div.className = 'suggestion-item';
            div.innerText = item;
            div.onclick = function() {
                input.value = item;
                container.style.display = "none";
            };
            container.innerHTML += div.outerHTML;
            // Re-attach clicks because outerHTML strings lose event listeners
            container.lastChild.onclick = function() {
                input.value = item;
                container.style.display = "none";
            };
        });
    } else {
        container.style.display = "none";
    }
}
