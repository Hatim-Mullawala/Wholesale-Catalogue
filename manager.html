<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard - Hatimi Hardware</title>
    <style>
        :root { --primary-gold: #b38728; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; color: #333; }

        /* HEADER & SEARCH */
        .search-container { background: white; padding: 15px 0; display: flex; justify-content: center; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 1000; }
        .search-box { width: 90%; max-width: 700px; padding: 12px 25px; border: 1.5px solid var(--primary-gold); border-radius: 50px; font-size: 16px; outline: none; }

        .main-wrapper { max-width: 1300px; margin: 20px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.06); }
        .catalog-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 3px solid var(--primary-gold); margin-bottom: 20px; }
        .logo-img { height: 80px !important; width: auto; display: block; object-fit: contain; }
        .brand-name { margin: 0; font-size: 28px; font-weight: 800; color: #b38728; text-transform: uppercase; }
        
        /* CATEGORY & GRID */
        .category-header { background: #222; color: #fff; padding: 12px 20px; font-size: 18px; font-weight: 700; text-transform: uppercase; margin-top: 30px; border-left: 8px solid var(--primary-gold); border-radius: 4px; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px 0; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; } }
        
        /* CARD STRUCTURE */
        .product-card { background: white; border: 1.5px solid #efefef; border-radius: 12px; padding: 15px; text-align: center; position: relative; min-height: 350px; display: flex; flex-direction: column; justify-content: flex-start; }
        .img-holder { height: 160px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #fff; }
        .img-holder img { max-height: 100%; max-width: 100%; object-fit: contain; }

        .trash-btn { position: absolute; top: 10px; right: 10px; background: white; color: #e74c3c; border: 1px solid #ddd; width: 38px; height: 38px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* SIDE CONTROLS */
        .side-controls { position: fixed; bottom: 30px; right: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 5000; }
        .ctrl-btn { width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-weight: bold; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        /* --- PROFESSIONAL LOGOUT BUTTON --- */
.btn-logout {
    background: linear-gradient(135.5deg, #444 0%, #222 100%) !important;
    color: #fff !important;
    border: 1px solid rgba(255,255,255,0.1) !important;
    padding: 12px 24px !important;
    border-radius: 50px !important; /* Pill shape is more modern */
    font-weight: 700 !important;
    font-size: 13px !important;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;

}

.btn-logout:hover {
    background: #e74c3c !important; /* Turns red only on hover */
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(231, 76, 60, 0.3);
}

.btn-logout svg {
    transition: transform 0.3s ease;
}

.btn-logout:hover svg {
    transform: translateX(-3px); /* Icon shifts left on hover */
}
        .btn-add { background: #222; color: white; font-size: 32px; }
        #backToTop { background: var(--primary-gold); color: white; font-size: 22px; display: none; }

        /* MODAL STYLING */
        .modal { display: none; position: fixed; z-index: 9999 !important; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 450px; padding: 25px; border-radius: 15px; position: relative; pointer-events: auto; }
        .close-modal { position: absolute; right: 15px; top: 10px; font-size: 30px; cursor: pointer; color: #888; }
        .input-group { margin-bottom: 15px; }
        .input-group input, .input-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .modal-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .btn-view { background: var(--primary-gold); color: white; padding: 12px; border-radius: 8px; font-weight: bold; border: none; margin-top: auto; width: 100%; cursor: pointer; }
  /* Styling for icons inside the modal table */
.action-icon {
    cursor: pointer;
    padding: 5px;
    border-radius: 4px;
    transition: 0.2s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}
.action-icon:hover { background: #f0f0f0; }
.edit-icon { color: #b38728; margin-right: 10px; }
.delete-row-icon { color: #e74c3c; }

/* Modal Table Padding */
.modal-table td { vertical-align: middle; padding: 12px 8px; }
/* Modern Backdrop with Blur */
.modal-backdrop {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(15, 23, 42, 0.6); /* Deep navy tint */

    z-index: 9998;
    transition: opacity 0.3s ease;
}

/* Professional Center Modal */
#addProductModal {
    display: none;
    position: fixed;
    z-index: 9999;
    left: 50%;
    top: 50%;

    border: 1px solid rgba(226, 232, 240, 0.8);
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); /* Bouncy entrance */
}

/* Modal Title */
#addProductModal h3 {
    margin: 0 0 20px 0;

    color: #1e293b;
    font-weight: 700;

}

/* Professional Input Styling */
.input-group { margin-bottom: 16px; }
.input-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #64748b;

}

.input-group input, .input-group select {

/* The Professional Button */
#submitBtn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #b38728 0%, #8a651a 100%);

    border: none;

}

#submitBtn:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 15px -3px rgba(179, 135, 40, 0.4);
}

#submitBtn:active { transform: translateY(0); }

#submitBtn:disabled {
    background: #cbd5e1;
    cursor: not-allowed;
    box-shadow: none;
}
/* Ensure the close 'X' is visible and stays at the top right */
.close-modal {
    position: absolute;
    right: 20px;
    top: 15px;
    font-size: 35px;
    font-weight: bold;
    cursor: pointer;
    color: #888;
    z-index: 10001; /* Higher than everything else */
}

.close-modal:hover { color: #000; }

/* Allow clicking the dark background to close the modal */
.modal {
    display: none;
    position: fixed;
    z-index: 9999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7); /* Dark background */
    align-items: center;
    justify-content: center;
}

/* Make modal content scrollable if there are many sizes */
.modal-content {
    background: white;
    width: 90%;
    max-width: 500px;
    max-height: 85vh; /* Stops modal from going off screen */
    padding: 30px;
    border-radius: 15px;
    position: relative;
    overflow-y: auto; /* Adds scrollbar if list is long */
}
/* Professional Toast Notification */
.toast-msg {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 15px 25px;
    border-radius: 12px;
    color: white;
    font-weight: bold;
    z-index: 20001;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    gap: 15px;
    background: #333; /* Dark professional theme */
}

.undo-link {
    color: #f1c40f;
    text-decoration: underline;
    cursor: pointer;
    font-weight: 800;
    text-transform: uppercase;
    font-size: 13px;
}

/* The timer bar at the bottom of the toast */
.toast-timer {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 4px;
    background: rgba(255,255,255,0.3);
    width: 100%;
    border-radius: 0 0 12px 12px;
    overflow: hidden;
}

.toast-progress {
    height: 100%;
    background: #f1c40f;
    width: 100%;
    animation: shrinkBar 5s linear forwards;
}

@keyframes shrinkBar {
    from { width: 100%; }
    to { width: 0%; }
}

/* Red Pulsing for Deleting state */
.deleting-row {
    background-color: #ffeaea !important;
    transition: opacity 0.5s ease;
    opacity: 0.5;
    pointer-events: none;
}
/* Custom Warning Modal */
.confirm-modal {
    display: none;
    position: fixed;
    z-index: 20000;
    left: 0; top: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(3px);

.confirm-content {
    background: white;
    padding: 30px;
    border-radius: 15px;

    max-width: 400px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);

.confirm-icon {

.confirm-btns {

.btn-confirm {

.btn-yes { background: #e74c3c; color: white; }
.btn-no { background: #eee; color: #333; }

<script>
    /* 1. SECURITY GATE */
    if (sessionStorage.getItem('managerAuth') !== 'true') {
        const p = prompt("Manager Password:");
        if (p === "hatimi786") { sessionStorage.setItem('managerAuth', 'true'); }
        else { window.location.href = "index.html"; }
    }

    let submitted = false; 
    
    // --- YOUR DATA LINKS ---
    const productSheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqfLPTM9QCajpUToFw0B2UTKUIv-0d3P5ldQxLWKYfD98PPVf5ZEDXITZuTrdNPh8D8dDKcJxO1D4O/pub?gid=897547923&single=true&output=csv';
    const webAppUrl = 'https://script.google.com/macros/s/AKfycbwMpy_3QqQNDrApSBO_BdQdA9R5DP_cv8NNp0_LoIEAuW1lhHfn45uWktkgfElqh7sH/exec';

    let allProducts = [];
// --- 1. LOAD DATA FROM CLOUD ---
function loadManagerData() {
    const container = document.getElementById('manager-container');
    container.innerHTML = "Opening Hatimi Inventory...";

    const script = document.createElement('script');
    // We add a timestamp (t=) to ensure we always get fresh data from the sheet
    script.src = `${webAppUrl}?callback=handleGoogleResponse&t=${Date.now()}`;
    
    script.onerror = function() {
        container.innerHTML = "<p style='color:red;'>Connection Error. Please check your WebApp URL.</p>";
    };

    document.body.appendChild(script);
}

// --- 2. RECEIVE DATA & FILL DROPDOWNS ---
function handleGoogleResponse(data) {
    allProducts = data;
    const container = document.getElementById('manager-container');
    container.innerHTML = ""; 
    
    // Show products on the dashboard
    renderManagerCatalog(allProducts);
    
    // Fill the Category Dropdown in the "Add Product" modal
    populateCats(allProducts);
}
    function parseCSVLine(line) {
        const result = []; let cell = '', inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            if (line[i] === '"' && line[i+1] === '"') { cell += '"'; i++; }
            else if (line[i] === '"') inQuotes = !inQuotes;
            else if (line[i] === ',' && !inQuotes) { result.push(cell.trim()); cell = ''; }
            else cell += line[i];
        }
        result.push(cell.trim()); return result;
    }
function renderManagerCatalog(products) {
    const container = document.getElementById('manager-container');
    const seen = new Set();
    let currentCat = "", html = "";

    // Safely sort even if brand or category is missing
    const sorted = [...products].sort((a, b) => 
        String(a.cat || "").localeCompare(String(b.cat || "")) || 
        String(a.brand || "").localeCompare(String(b.brand || ""))
    );

    sorted.forEach(p => {
        // FORCE EVERYTHING TO STRING TO PREVENT THE .replace() ERROR
        const b = String(p.brand || "N/A");
        const n = String(p.name || "Unnamed Product");
        const c = String(p.cat || "Other");

        const key = `${c}|${b}|${n}`;
        
        if (!seen.has(key)) {
            if (c !== currentCat) {
                if (html !== "") html += `</div>`; 
                currentCat = c;
                html += `<div class="category-header">${currentCat}</div><div class="product-grid">`;
            }
            
            // Safe cleaning for image paths
            const clean = (str) => str.toLowerCase().trim()
                .replace(/[^a-z0-9]/g, '-')
                .replace(/-+/g, '-');

            const cleanN = clean(n);
            const cleanB = clean(b);
            
            const imgId = `img-${Math.random().toString(36).substr(2, 5)}`;
            
            // Safe escaping for the buttons
            const escB = b.replace(/'/g, "\\'");
            const escN = n.replace(/'/g, "\\'");

            html += `<div class="product-card">
                <div class="trash-btn" onclick="deleteEntireProduct('${escB}', '${escN}')">
                    <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M9,3V4H4V6H5V19A2,2 0 0,0 7,21H17A2,2 0 0,0 19,19V6H20V4H15V3H9M7,6H17V19H7V6M9,8V17H11V8H9M13,8V17H15V8H13Z"/></svg>
                </div>
                <div class="img-holder"><img id="${imgId}" src="https://placehold.co/150x150?text=Searching..."></div>
                <div style="color:var(--primary-gold); font-weight:900; font-size:11px; text-transform:uppercase;">${b}</div>
                <div style="font-weight:800; font-size:18px; line-height:1.2; margin-bottom:15px;">${n}</div>
                <button class="btn-view" onclick="openModal('${escN}', '${escB}')">Check Sizes</button>
            </div>`;
            
            setTimeout(() => {
                const imgEl = document.getElementById(imgId);
                const paths = [
                    p.img,
                    `wholesale/${cleanB}-${cleanN}.jpg`,
                    `wholesale/${cleanN}.jpg`
                ];
                tryLoadImage(imgEl, paths.filter(src => src && src.length > 5));
            }, 50);
            seen.add(key);
        }
    });
    container.innerHTML = html + "</div>";
}
    function tryLoadImage(imgElement, urls) {
        if (!imgElement) return;
        let index = 0;
        function attemptLoad() {
            if (index < urls.length) {
                const imgTester = new Image();
                imgTester.onload = () => { imgElement.src = urls[index-1]; };
                imgTester.onerror = attemptLoad;
                imgTester.src = urls[index++];
            } else { imgElement.src = 'https://placehold.co/150?text=No+Photo'; }
        }
        attemptLoad();
    }

    /* 4. MODAL & EDITING LOGIC */
    function openModal(name, brand) {
        document.getElementById('modalTitle').innerText = name;
        document.getElementById('modalBrand').innerText = brand;
        const tbody = document.getElementById('modalTableBody');
        tbody.innerHTML = "";

        const variants = allProducts.filter(p => {
    const pName = String(p.name || "Unnamed Product").trim();
    const pBrand = (p.brand && String(p.brand).trim() !== "") ? String(p.brand).trim() : "N/A";
    
    return pName === name.trim() && pBrand === brand.trim();
});
        const shownSizes = new Set();

        variants.forEach((v, idx) => {
            const sizeList = String(v.specs || "").split(','); 
            sizeList.forEach((singleSize, sIdx) => {
                const cleanS = singleSize.trim();
                if (cleanS !== "" && !shownSizes.has(cleanS)) {
                    const rowId = `row-${idx}-${sIdx}`;
                    const escB = v.brand.replace(/'/g, "\\'");
                    const escN = v.name.replace(/'/g, "\\'");
                    const escS = cleanS.replace(/'/g, "\\'");
                    tbody.innerHTML += `
                    <tr id="${rowId}" style="border-bottom:1px solid #eee;">
                        <td class="size-cell" style="padding:12px; font-weight:700;">${cleanS}</td>
                        <td class="mrp-cell" style="padding:12px; color: #b38728; font-weight:bold;">₹${v.mrp}</td>
                        <td style="text-align: right;">
                            <span class="action-icon edit-icon" onclick="makeEditable('${rowId}', '${escB}', '${escN}', '${escS}', '${v.mrp}')">
                                <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M20.71,7.04C21.1,6.65 21.1,6 20.71,5.63L18.37,3.29C18,2.9 17.35,2.9 16.96,3.29L15.12,5.12L18.87,8.87M3,17.25V21H6.75L17.81,9.93L14.06,6.18L3,17.25Z"/></svg>
                            </span>

    function makeEditable(rowId, brand, name, oldSize, oldMrp) {
        const row = document.getElementById(rowId);
        row.querySelector('.size-cell').innerHTML = `<input type="text" id="edit-size-${rowId}" value="${oldSize}" style="width:80px; padding:5px; border:1px solid #b38728;">`;
        row.querySelector('.mrp-cell').innerHTML = `₹<input type="number" id="edit-mrp-${rowId}" value="${oldMrp}" style="width:60px; padding:5px; border:1px solid #b38728;">`;
        row.querySelector('td:last-child').innerHTML = `
            <button onclick="saveInLine('${rowId}', '${brand.replace(/'/g, "\\'")}', '${name.replace(/'/g, "\\'")}', '${oldSize.replace(/'/g, "\\'")}')" style="background:#27ae60; color:white; border:none; padding:6px 10px; border-radius:4px; cursor:pointer; font-weight:bold; font-size:11px;">SAVE</button>
            <button onclick="cancelEdit('${rowId}', '${oldSize.replace(/'/g, "\\'")}', '${oldMrp}', '${brand.replace(/'/g, "\\'")}', '${name.replace(/'/g, "\\'")}')" style="background:#95a5a6; color:white; border:none; padding:6px 10px; border-radius:4px; cursor:pointer; margin-left:5px; font-size:11px;">X</button>`;
    }

   async function saveInLine(rowId, brand, name, oldSize) {
    const row = document.getElementById(rowId);
    const newSize = document.getElementById(`edit-size-${rowId}`).value;
    const newMrp = document.getElementById(`edit-mrp-${rowId}`).value;
    const actionCell = row.querySelector('td:last-child');

    actionCell.innerHTML = `<span style="color:#b38728; font-weight:bold; font-size:11px;">SYNCING...</span>`;

    fetch(webAppUrl, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({ action: "updateRow", brand, name, oldSize, newSize, newMrp })
    }).then(() => {
        // Update the UI immediately
        row.querySelector('.size-cell').innerText = newSize;
        row.querySelector('.mrp-cell').innerText = "₹" + newMrp;
        
        // Restore buttons
        cancelEdit(rowId, newSize, newMrp, brand, name);
        showToast("Changes saved to Cloud");
        
        // Update local memory
        allProducts.forEach(p => {
            if(p.brand === brand && p.name === name && String(p.specs).includes(oldSize)) {
                p.specs = newSize;
                p.mrp = newMrp;
            }
        });
    });
}

    function cancelEdit(rowId, oldSize, oldMrp, brand, name) {
        const row = document.getElementById(rowId);
        row.querySelector('td:last-child').innerHTML = `

let deleteTimeout = null;
let lastDeletedData = null;

function showToast(text, type = 'success') {
    const toast = document.createElement('div');
    toast.className = `toast-msg`;
    // Green for success, Orange/Gold for warnings
    toast.style.background = (type === 'success') ? '#27ae60' : '#e67e22';
    toast.style.color = "white";
    toast.style.padding = "12px 25px";
    toast.style.borderRadius = "8px";
    toast.style.zIndex = "20005";
    toast.innerText = text;
    
    document.body.appendChild(toast);
    
    // Smooth fade out
    setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 500);
    }, 3000);
}

function showUndoToast(message, actionData) {
    if (deleteTimeout) executeFinalDelete(); 
    lastDeletedData = actionData;

    const toast = document.createElement('div');
    toast.id = "undoToast";
    toast.className = `toast-msg`;
    toast.innerHTML = `
        <span>${message}</span>
        <span class="undo-link" onclick="undoAction()">Undo</span>
        <div class="toast-timer"><div class="toast-progress"></div></div>
    `;
    document.body.appendChild(toast);

    deleteTimeout = setTimeout(() => executeFinalDelete(), 5000);
}

function undoAction() {
    clearTimeout(deleteTimeout);
    deleteTimeout = null;
    document.getElementById('undoToast')?.remove();

    if (lastDeletedData.type === 'full') {
        const target = document.getElementById(lastDeletedData.id);
        if(target) {
            target.style.display = 'flex';
            setTimeout(() => target.style.opacity = '1', 10);
        }
    } else {
        const row = document.getElementById(lastDeletedData.id);
        if(row) row.style.display = 'table-row';
    }
    
    lastDeletedData = null;
    showToast("Restored successfully!", "success"); // Feedback for Undo
}

async function executeFinalDelete() {
    const toast = document.getElementById('undoToast');
    if (toast) {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
    }
    
    if (!lastDeletedData) return;

    const payload = { 
        action: lastDeletedData.type === 'full' ? "delete" : "deleteRow",
        brand: lastDeletedData.brand,
        name: lastDeletedData.name,
        size: lastDeletedData.size 
    };

    // 1. Send the data to Google
    fetch(webAppUrl, { 
        method: 'POST', 
        mode: 'no-cors', 
        body: JSON.stringify(payload) 
    });

    // 2. TRIGGER THE MESSAGE MANUALLY
    // Since 'no-cors' doesn't return a success signal, we show it after sending
    setTimeout(() => {
        showToast("Product successfully deleted from cloud", "success");
    }, 500);

    // 3. Clear the memory
    lastDeletedData = null;
    deleteTimeout = null;
}

// --- TRIGGER FUNCTIONS ---
function deleteEntireProduct(brand, name) {
    const cleanId = "card-" + btoa(brand + name).replace(/=/g, ''); // Unique ID for undo
    const cards = document.querySelectorAll('.product-card');
    const target = Array.from(cards).find(c => c.innerText.includes(brand) && c.innerText.includes(name));
    
    if(target) target.id = cleanId;

    askBeforeDelete("Delete Product?", `Remove ${brand} ${name}?`, () => {
        if(target) {
            target.style.opacity = "0";
            setTimeout(() => target.style.display = 'none', 500);
        }
        showUndoToast("Product deleted", { type: 'full', brand, name, id: cleanId });
    });
}

function deleteRow(brand, name, size, rowId) {
    askBeforeDelete("Remove Size?", `Remove "${size}"?`, () => {
        const row = document.getElementById(rowId);
        if(row) row.style.display = 'none';
        showUndoToast("Size removed", { type: 'row', brand, name, size, id: rowId });
    });
}

function askBeforeDelete(title, text, action) {
    document.getElementById('confirmTitle').innerText = title;
    document.getElementById('confirmText').innerText = text;
    document.getElementById('customConfirmModal').style.display = 'flex';
    document.getElementById('confirmYesBtn').onclick = () => {
        action();
        document.getElementById('customConfirmModal').style.display = 'none';
    };
}

function closeConfirm() { document.getElementById('customConfirmModal').style.display = 'none'; }

   async function handleAddProduct(event) {
    event.preventDefault(); 
    
    const btn = document.getElementById('submitBtn');
    btn.innerText = "SAVING TO SHEET...";
    btn.disabled = true;

    try {
        const fileInput = document.getElementById('new-product-file');
        let fileData = "", mimeType = "", filename = "";

        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            const reader = new FileReader();
            fileData = await new Promise((res) => {
                reader.onload = (e) => res(e.target.result.split(',')[1]);
                reader.readAsDataURL(file);
            });
            mimeType = file.type;
            filename = file.name;
        }

        const payload = {
            action: "addWithImage",
            cat: document.getElementById('newCat').value,
            brand: document.getElementById('newBrand').value || "N/A",
            name: document.getElementById('newName').value,
            specs: document.getElementById('newSpecs').value,
            mrp: document.getElementById('newMrp').value,
            fileData: fileData,
            mimeType: mimeType,
            filename: filename
        };

        // Send to Google using 'no-cors' to bypass security blocks
        await fetch(webAppUrl, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(payload)
        });

        showToast("Product added successfully!", "success");
        
        // Reset form and UI
        document.getElementById('addProductForm').reset();
        closeAllModals();

        // Refresh the whole inventory after 2 seconds
        setTimeout(() => { loadManagerData(); }, 2000);

    } catch (error) {
        console.error(error);
        showToast("Failed to save product.", "error");
    } finally {
        btn.innerText = "Add to Inventory";
        btn.disabled = false;
    }
}
    // --- 3. DYNAMIC CATEGORY LIST ---
function populateCats(products) {
    const catSelect = document.getElementById('newCat'); 
    if (!catSelect) return;

    // Get unique categories from the sheet data
    const categories = [...new Set(products.map(p => p.cat))].filter(c => c);
    
    let html = '<option value="">Select Category</option>';
    
    // Add existing categories from Hatimi Hardware
    categories.sort().forEach(c => {
        html += `<option value="${c}">${c}</option>`;
    });

    // Always keep the "Add New" option at the bottom
    html += '<option value="ADD_NEW" style="color:#d4af37; font-weight:bold;">+ Add New Category</option>';
    
    catSelect.innerHTML = html;

    // Logic to handle when user wants to create a new category
    catSelect.onchange = function() {
        if (this.value === "ADD_NEW") {
            const newCat = prompt("Enter New Category Name:");
            if (newCat) {
                const opt = document.createElement('option');
                opt.value = newCat;
                opt.text = newCat;
                this.add(opt, this.options[this.length - 1]);
                this.value = newCat;
            } else {
                this.value = "";
            }
        }
    };
}
    function filterProducts() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.product-card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(q) ? "" : "none");
    }
    function logout() { sessionStorage.removeItem('managerAuth'); window.location.href = "index.html"; }
    function scrollToTop() { window.scrollTo({top: 0, behavior: 'smooth'}); }
    window.onscroll = () => { document.getElementById("backToTop").style.display = (window.scrollY > 300) ? "flex" : "none"; };
    function toggleAddModal() { const m = document.getElementById('addProductModal'), b = document.getElementById('modalBackdrop'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; b.style.display = b.style.display === 'block' ? 'none' : 'block'; }
   function closeAllModals() {
    // Hide Price Modal
    const priceM = document.getElementById('priceModal');
    if (priceM) priceM.style.display = 'none';
    
    // Hide Add Product Modal and Backdrop
    const addP = document.getElementById('addProductModal');
    const backD = document.getElementById('modalBackdrop');
    if (addP) addP.style.display = 'none';
    if (backD) backD.style.display = 'none';
    
    // Allow the body to scroll again
    document.body.style.overflow = 'auto';
}
